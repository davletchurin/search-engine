name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install local Lucene libs
        run: |
          mkdir -p ~/.m2/repository/org/apache/lucene
          cp -r libs/lucene/* ~/.m2/repository/org/apache/lucene/

      - name: Build with Maven
        run: mvn clean verify

      - name: Build Docker image
        run: docker build . -t search-engine:latest